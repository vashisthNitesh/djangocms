{% load menu_tags %}
{% for child in children %}
    <div class="relative group">
        <a href="{{ child.get_absolute_url }}" 
           class="nav-link text-white hover:text-accent-500 font-medium tracking-wide transition-colors {% if child.selected %}text-accent-500{% endif %}">
            {{ child.get_menu_title }}
        </a>
        
        {% if child.children %}
            <div class="absolute top-full left-1/2 -translate-x-1/2 mt-4 w-48 bg-white rounded-2xl shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 border border-slate-100 overflow-hidden py-2">
                {% for subchild in child.children %}
                    <a href="{{ subchild.get_absolute_url }}" 
                       class="block px-6 py-3 text-sm text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
                        {{ subchild.get_menu_title }}
                    </a>
                {% endfor %}
            </div>
        {% endif %}
    </div>
{% endfor %}
