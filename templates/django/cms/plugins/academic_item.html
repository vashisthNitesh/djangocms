<div class="card-premium h-full group flex flex-col hover:bg-slate-50 transition-all duration-700">
  <div class="flex-1">
    {# Badge #}
    <div class="mb-10 flex items-center justify-between">
      <span class="px-5 py-2 rounded-full bg-accent-100 text-accent-700 text-xs font-black uppercase tracking-widest border border-accent-200">
        {{ instance.tag }}
      </span>
      <div class="h-px bg-slate-200 flex-1 ml-6"></div>
    </div>

    {# Title #}
    <h3 class="text-3xl md:text-4xl font-display font-medium text-slate-900 mb-8 group-hover:text-accent-600 transition-colors">
      {{ instance.label }}
    </h3>

    {# Subject List (Premium Structured Catalog Style) #}
    <div class="space-y-4 mb-12">
      {% if subjects %}
        {% for subject in subjects %}
          <div class="flex items-start gap-4 group/item">
            <svg class="w-5 h-5 mt-1 text-accent-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
              <circle cx="10" cy="10" r="3" />
            </svg>
            <span class="text-slate-600 group-hover/item:text-slate-900 transition-colors font-medium text-lg leading-relaxed">{{ subject }}</span>
          </div>
        {% endfor %}
      {% else %}
        <p class="text-slate-400 font-medium italic">Standard Academic Curriculum</p>
      {% endif %}
    </div>
  </div>

</div>
