<div class="card-premium h-full group">
  <div class="flex items-center gap-4 mb-8">
    <div class="w-12 h-12 rounded-2xl bg-slate-900 text-white flex items-center justify-center text-sm font-bold shadow-lg group-hover:bg-accent-500 transition-colors">
      {{ instance.tag }}
    </div>
    <h3 class="text-xl font-bold text-slate-900">{{ instance.label }}</h3>
  </div>
  
  <div class="space-y-4">
    {% for subject in subjects %}
      <div class="flex items-center justify-between p-4 bg-slate-50/50 rounded-2xl border border-slate-100 group/row hover:bg-white hover:shadow-md hover:border-slate-200 transition-all duration-300">
        <span class="font-bold text-slate-700 group-hover/row:text-slate-900 transition-colors">{{ subject|safe }}</span>
        <svg class="w-5 h-5 text-slate-300 group-hover/row:text-accent-500 group-hover/row:translate-x-1 transition-all duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
        </svg>
      </div>
    {% endfor %}
  </div>
</div>
