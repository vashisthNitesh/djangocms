{% load cms_tags %}
<section class="section-container border-y border-slate-100 bg-white">
  <div class="section-header">
    <span class="section-tag">Academic Voice</span>
    <h2 class="text-slate-900 font-display italic">{{ instance.title|default:"Wisdom & Reflections" }}</h2>
    <div class="w-24 h-px bg-slate-300 mx-auto mt-6"></div>
  </div>
  
  <div class="swiper testimonial-swiper max-w-4xl mx-auto mt-8 md:mt-12 overflow-hidden">
    <div class="swiper-wrapper">
      {% for plugin in instance.get_children %}
        {% render_plugin plugin %}
      {% endfor %}
    </div>
    <div class="swiper-pagination !-bottom-2"></div>
  </div>
</section>
