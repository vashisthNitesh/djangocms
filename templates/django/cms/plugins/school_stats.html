{% load cms_tags %}
<section class="section-container">
  <div class="bg-slate-900 rounded-[4rem] p-16 md:p-24 relative overflow-hidden">
    {# Background Decoration #}
    <div class="absolute right-0 top-0 w-1/3 h-full bg-slate-800/20 translate-x-1/2 -rotate-12"></div>
    
    <div class="relative z-10 grid grid-cols-2 lg:grid-cols-4 gap-12 text-center">
      {% for stat in stats %}
        {% if stat.label and stat.value %}
          <div class="flex flex-col items-center group cursor-default">
            <span class="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-br from-white to-white/60 mb-4 tabular-nums group-hover:scale-110 transition-transform duration-500 drop-shadow-lg">{{ stat.value|safe }}</span>
            <span class="text-accent-500 text-xs font-bold uppercase tracking-[0.25em] drop-shadow-sm">{{ stat.label|safe }}</span>
          </div>
        {% endif %}
      {% endfor %}
    </div>
  </div>
</section>
