<div class="group bg-white rounded-[3rem] overflow-hidden shadow-sm border border-slate-100 hover:shadow-premium transition-all duration-500">
  <div class="relative w-full aspect-[16/10] overflow-hidden">
    {% if instance.image %}
      <img src="{{ instance.image.url }}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
    {% else %}
      <div class="w-full h-full bg-slate-50 flex items-center justify-center text-slate-200">📰</div>
    {% endif %}
    <div class="absolute top-6 left-6 px-4 py-2 bg-white/90 backdrop-blur-md rounded-xl shadow-lg">
      <span class="text-slate-900 font-bold text-xs uppercase">{{ instance.date|date:"d M Y" }}</span>
    </div>
  </div>
  
  <div class="p-10">
    <h3 class="text-2xl font-bold text-slate-900 mb-4 transition-colors group-hover:text-accent-600">{{ instance.title|safe }}</h3>
    {% if instance.excerpt %}
      <p class="text-slate-500 text-sm leading-relaxed line-clamp-2 mb-8">{{ instance.excerpt|safe }}</p>
    {% endif %}
    {% if instance.url %}
      <a href="{{ instance.url }}" class="text-accent-600 font-bold text-xs uppercase tracking-widest flex items-center gap-2 group/link">
        Read More 
        <span class="transition-transform group-hover/link:translate-x-1">→</span>
      </a>
    {% endif %}
  </div>
</div>
