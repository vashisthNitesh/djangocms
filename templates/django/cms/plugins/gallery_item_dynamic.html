<div class="relative aspect-square rounded-3xl overflow-hidden group cursor-pointer gallery-item" 
     data-src="{{ instance.image.url }}" data-caption="{{ instance.caption|default:'' }}">
  <img src="{{ instance.image.url }}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
  <div class="absolute inset-x-0 bottom-0 p-6 bg-gradient-to-t from-slate-900/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
    <p class="text-white text-sm font-medium">{{ instance.caption|safe }}</p>
  </div>
</div>
