<div class="bg-white rounded-[3rem] p-10 shadow-[0_12px_40px_rgba(0,0,0,0.04)] border border-slate-200 hover:shadow-[0_20px_60px_rgba(0,0,0,0.08)] hover:border-slate-300 hover:-translate-y-2 transition-all duration-500">
  <div class="relative w-full aspect-square rounded-[2rem] overflow-hidden mb-8 group">
    {% if instance.photo %}
      <img src="{{ instance.photo.url }}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
    {% else %}
      <div class="w-full h-full bg-slate-50 flex items-center justify-center text-slate-200">👤</div>
    {% endif %}
  </div>
  
  <h3 class="text-2xl font-bold text-slate-900 mb-2">{{ instance.name|safe }}</h3>
  <p class="text-accent-600 font-bold text-xs uppercase tracking-widest mb-6">{{ instance.designation|safe }}</p>
  
  {% if instance.bio %}
    <p class="text-slate-500 text-sm leading-relaxed line-clamp-3 italic">{{ instance.bio|safe }}</p>
  {% endif %}
</div>
