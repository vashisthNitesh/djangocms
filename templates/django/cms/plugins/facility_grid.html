{% load cms_tags %}
<section class="section-container relative overflow-hidden">
  <!-- Subtle background decorative elements -->
  <div class="absolute -top-24 -right-24 w-96 h-96 bg-accent-500/5 rounded-full blur-[100px] -z-10"></div>
  <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-slate-100 rounded-full blur-[100px] -z-10"></div>

  <div class="section-header mb-16 md:mb-24 text-center">
    <span class="section-tag">
      Environment
    </span>
    <h2 class="text-4xl md:text-5xl font-display text-slate-900 mb-6 font-semibold tracking-tight">
      {{ instance.title|default:"Campus Facilities" }}
    </h2>
    <div class="flex items-center justify-center gap-4 mb-8">
      <div class="w-12 h-px bg-accent-500/30"></div>
      <div class="w-2 h-2 rounded-full bg-accent-500"></div>
      <div class="w-12 h-px bg-accent-500/30"></div>
    </div>
    {% if instance.tagline %}
       <p class="text-slate-500 max-w-2xl mx-auto text-lg leading-relaxed font-light">
         {{ instance.tagline|safe }}
       </p>
    {% endif %}
  </div>
  
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
    {% for plugin in instance.get_children %}
      <div class="h-full">
        {% render_plugin plugin %}
      </div>
    {% endfor %}
  </div>
</section>
