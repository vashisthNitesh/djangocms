<div class="swiper-slide h-full">
  <div class="flex flex-col items-center text-center p-12 md:p-16 bg-white rounded-[3rem] shadow-sm hover:shadow-premium hover:-translate-y-2 transition-all duration-500 border border-slate-100 relative overflow-hidden group">
    {# Watermark Quote #}
    <div class="absolute -top-6 -left-6 text-[12rem] leading-none font-serif text-slate-50 opacity-50 group-hover:text-accent-50 group-hover:scale-110 transition-all duration-700 pointer-events-none select-none">"</div>
    
    <div class="w-24 h-24 rounded-full overflow-hidden mb-10 border-4 border-white shadow-xl relative z-10 group-hover:border-accent-100 transition-colors duration-500">
      {% if instance.image %}
        <img src="{{ instance.image.url }}" class="w-full h-full object-cover filter grayscale group-hover:grayscale-0 transition-all duration-700">
      {% else %}
        <div class="w-full h-full bg-slate-50 flex items-center justify-center text-3xl">👤</div>
      {% endif %}
    </div>
    
    <p class="text-xl md:text-2xl text-slate-600 font-medium italic leading-relaxed mb-10 relative z-10 group-hover:text-slate-800 transition-colors">
      "{{ instance.quote|safe }}"
    </p>
    
    <div class="relative z-10">
      <h4 class="text-xl font-bold text-slate-900 mb-2">{{ instance.author|safe }}</h4>
      <p class="text-accent-600 text-xs font-black uppercase tracking-[0.2em]">{{ instance.role|safe }}</p>
    </div>
  </div>
</div>
