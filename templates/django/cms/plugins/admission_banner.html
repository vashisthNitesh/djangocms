{% load cms_tags %}
<section class="relative overflow-hidden py-24 md:py-32 rounded-[4rem] mx-4 md:mx-12 my-12 md:my-24 shadow-2xl hover:shadow-premium transition-shadow duration-700 bg-slate-900 group">
  {# Background Accent Decoration #}
  <div class="absolute -right-32 -top-32 w-96 h-96 bg-accent-500/20 rounded-full blur-[100px] group-hover:bg-accent-500/30 transition-colors duration-700"></div>
  <div class="absolute -left-32 -bottom-32 w-96 h-96 bg-white/10 rounded-full blur-[100px] group-hover:bg-white/20 transition-colors duration-700"></div>
  
  <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-12 px-12 md:px-24">
    <div class="max-w-2xl text-center md:text-left">
      <h2 class="text-4xl md:text-6xl font-black leading-tight mb-6 text-transparent bg-clip-text bg-gradient-to-r from-white to-white/70">{{ instance.title|safe }}</h2>
      {% if instance.subtitle %}
        <p class="text-white/80 text-lg md:text-2xl font-light leading-relaxed">{{ instance.subtitle|safe }}</p>
      {% endif %}
    </div>
    
    <div class="flex-shrink-0 relative">
      <div class="absolute inset-0 bg-accent-500 blur-xl opacity-30 group-hover:opacity-60 transition-opacity duration-500 rounded-full"></div>
      <a href="{{ instance.btn_url }}" class="relative inline-flex items-center gap-3 px-10 py-5 rounded-full bg-accent-500 text-slate-900 font-black tracking-wide text-lg shadow-2xl hover:bg-white hover:-translate-y-1 active:scale-95 transition-all duration-300">
        {{ instance.btn_text|default:"Apply Now" }} →
      </a>
    </div>
  </div>
</section>
