<div class="group bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-50 hover:shadow-premium transition-all duration-500">
  {% if instance.image %}
    <div class="w-full aspect-[4/3] rounded-3xl overflow-hidden mb-8 group-hover:shadow-2xl transition-all duration-500">
      <img src="{{ instance.image.url }}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
    </div>
  {% else %}
    <div class="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center text-3xl mb-8 group-hover:bg-accent-500 group-hover:text-white transition-colors">
      {{ instance.icon_class|default:"🏫" }}
    </div>
  {% endif %}
  <h3 class="text-xl font-bold text-slate-900 mb-4">{{ instance.title|safe }}</h3>
  <p class="text-slate-500 text-sm leading-relaxed">{{ instance.description|safe }}</p>
</div>
