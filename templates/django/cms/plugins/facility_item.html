<div class="group bg-white p-8 rounded-[2.5rem] shadow-[0_12px_40px_rgba(0,0,0,0.04)] border border-slate-100 hover:shadow-[0_20px_60px_rgba(0,0,0,0.08)] hover:border-accent-200 transition-all duration-700 flex flex-col h-full">
  {% if instance.image %}
    <div class="w-full aspect-[4/3] rounded-3xl overflow-hidden mb-8 shadow-sm">
      <img src="{{ instance.image.url }}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
    </div>
  {% else %}
    <div class="w-16 h-16 bg-accent-50 rounded-2xl flex items-center justify-center text-3xl mb-8 border border-accent-100 group-hover:bg-accent-500 group-hover:text-white group-hover:-translate-y-1 transition-all duration-500">
      {{ instance.icon_class|default:"🏫" }}
    </div>
  {% endif %}
  
  <h3 class="text-xl md:text-2xl font-display font-medium text-slate-900 mb-4 group-hover:text-accent-600 transition-colors">
    {{ instance.title|safe }}
  </h3>
  
  <p class="text-slate-500 text-sm md:text-base leading-relaxed mb-6 flex-1">
    {{ instance.description|safe }}
  </p>
  
  <div class="pt-6 border-t border-slate-50 opacity-0 group-hover:opacity-100 transition-opacity duration-700">
    <span class="text-xs font-black uppercase tracking-widest text-accent-600">Premium Facility</span>
  </div>
</div>
